{% extends "base.html" %}
{% block title %}{{ code }} Error{% endblock %}
{% block content %}
<div class="card" style="max-width:500px; margin:60px auto; text-align:center;">
  <div style="font-size:64px; margin-bottom:10px;">&#x26A0;&#xFE0F;</div>
  <h2 style="font-size:28px; color:var(--red);">{{ code }}</h2>
  <p style="color:var(--muted); margin:12px 0 20px;">{{ msg }}</p>
  <a href="{{ url_for('dashboard') }}" class="btn btn-audit">&#8592; Back to Dashboard</a>
</div>
{% endblock %}
