<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — AI Employee Vault</title>
  <style>
    :root { --bg:#0f1117; --surface:#1a1d27; --border:#2e3250; --accent:#5865f2; --text:#e8eaf6; --muted:#8892b0; --red:#e74c3c; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:'Segoe UI',system-ui,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:40px 36px; width:340px; }
    .brand { text-align:center; margin-bottom:28px; }
    .brand .icon { font-size:36px; margin-bottom:8px; }
    .brand h1 { font-size:18px; font-weight:700; }
    .brand p  { font-size:12px; color:var(--muted); margin-top:4px; }
    label { display:block; font-size:12px; color:var(--muted); margin-bottom:6px; font-weight:600; }
    input[type=password] {
      width:100%; padding:10px 12px; border-radius:8px;
      background:#0f1117; border:1px solid var(--border); color:var(--text);
      font-size:14px; outline:none; transition:border-color .2s;
    }
    input[type=password]:focus { border-color:var(--accent); }
    .btn-login {
      width:100%; margin-top:18px; padding:11px; border-radius:8px;
      background:var(--accent); color:#fff; font-size:14px; font-weight:700;
      border:none; cursor:pointer; transition:opacity .15s;
    }
    .btn-login:hover { opacity:.87; }
    .flash-error { margin-top:14px; padding:9px 12px; background:rgba(231,76,60,.15); border:1px solid var(--red); border-radius:6px; color:var(--red); font-size:13px; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="brand">
    <div class="icon">&#x1F916;</div>
    <h1>AI Employee Vault</h1>
    <p>Sign in to continue</p>
  </div>
  <form method="post">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autofocus placeholder="Enter password"/>
    <button type="submit" class="btn-login">Sign In</button>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash-error">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
  </form>
</div>
</body>
</html>
